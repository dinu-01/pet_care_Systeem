 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Management - Happy Paws</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c5cff;
            --accent: #00d3a7;
            --warn: #ffb020;
            --error: #ff5c7a;
            --success: #10b981;
            --bg: #0b1020;
            --card: #121935;
            --text: #e8ecf3;
            --muted: #9aa3b2;
            --border: #243057;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            //background: linear-gradient(135deg, var(--primary), #5a3fd6);
            color: var(--text);
            padding: 2rem 1rem;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .sidebar-header h2 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            color: var(--text);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: background 0.3s ease;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(255,255,255,0.1);
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0));
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 14px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 20px;
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: .25s;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(90deg, var(--error), #ff7fa0);
            color: #fff;
        }

        .btn-ghost {
            background: rgba(255,255,255,.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,.25);
            margin-top: 20px;
        }

        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 16px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #0e1631;
            color: var(--text);
            outline: none;
            transition: .2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.35);
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
        }

        th {
            position: sticky;
            top: 0;
            background: #0f1837;
            text-align: left;
        }

        .feedback-item {
            background: rgba(255,255,255,.02);
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .feedback-type {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        .type-ANONYMOUS {
            background: rgba(124,92,255,.2);
            color: #a78bfa;
        }

        .type-IDENTIFIED {
            background: rgba(16,185,129,.2);
            color: #34d399;
        }

        .feedback-rating {
            color: var(--warn);
        }

        .feedback-category {
            font-size: 12px;
            background: rgba(255,255,255,.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .feedback-user {
            font-size: 12px;
            color: var(--muted);
        }

        .user-anonymous {
            color: var(--muted);
            font-style: italic;
        }

        .feedback-description {
            margin: 8px 0;
            line-height: 1.5;
        }

        .feedback-date {
            font-size: 12px;
            color: var(--muted);
        }

        .stats {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            min-width: 110px;
            text-align: center;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,.3);
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: grid;
            gap: 8px;
            z-index: 20;
        }

        .toast {
            background: #0e1631;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 10px;
            box-shadow: 0 10px 24px rgba(0,0,0,.35);
            animation: slideIn .25s ease-out;
        }

        .toast.success {
            border-color: #1e9d7a;
        }

        .toast.error {
            border-color: #cc3b5a;
        }

        @keyframes slideIn {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--border);
        }

        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }

            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-paw"></i> Happy Paws</h2>
            <small>Admin Dashboard</small>
        </div>

        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html"><i class="fas fa-bullhorn"></i> Announcements</a></li>
            <li><a href="admin-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
            <li><a href="admin-feedback.html" class="active"><i class="fas fa-comment-dots"></i> Feedback</a></li>
            <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <header>
                <div>
                    <h1>💬 Feedback Management</h1>
                    <div class="muted">View and manage user feedback</div>
                </div>
                <div class="muted" id="userInfo"></div>
            </header>

            <div class="card">
                <div class="filters">
                    <div>
                        <label class="muted">Search Feedback</label>
                        <input id="searchInput" placeholder="Search by description, category...">
                    </div>
                    <div>
                        <label class="muted">Filter by Type</label>
                        <select id="typeFilter">
                            <option value="">All Types</option>
                            <option value="ANONYMOUS">Anonymous</option>
                            <option value="IDENTIFIED">Identified</option>
                        </select>
                    </div>
                    <div>
                        <label class="muted">Filter by Category</label>
                        <select id="categoryFilter">
                            <option value="">All Categories</option>
                            <option value="SERVICE">Service Quality</option>
                            <option value="FACILITY">Facility & Cleanliness</option>
                            <option value="STAFF">Staff Behavior</option>
                            <option value="APPOINTMENT">Appointment System</option>
                            <option value="PRODUCTS">Products & Shop</option>
                            <option value="WEBSITE">Website Experience</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                </div>

                <div class="stats" id="statsContainer">
                    <div class="stat-item">Total<br><span id="totalFeedback">0</span></div>
                    <!-- Stats will be populated by JavaScript -->
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px">
                    <strong>All Feedback</strong>
                    <div class="muted" id="resultCount">Loading...</div>
                </div>

                <div id="feedbackList">
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <h3>No Feedback Available</h3>
                        <p>User feedback will appear here.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="toast"></div>

<script>
    // Configuration
    const BASE_URL = "http://localhost:8080";
    let allFeedback = [];

    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
        checkAdminAccess();
        loadFeedback();
        setupEventListeners();
    });

    function checkAdminAccess() {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'ADMIN') {
            alert('🚫 Access Denied - Admin privileges required');
            window.location.href = 'login.html';
            return;
        }
        document.getElementById('userInfo').innerHTML =
            `Logged in as: <strong>${currentUser.username}</strong> (ADMIN)`;
    }

    function setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', filterFeedback);
        document.getElementById('typeFilter').addEventListener('change', filterFeedback);
        document.getElementById('categoryFilter').addEventListener('change', filterFeedback);
    }

    async function loadFeedback() {
        try {
            const response = await fetch(`${BASE_URL}/api/v1/feedback/all`);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            }

            allFeedback = await response.json();
            renderFeedback(allFeedback);
            updateStats(allFeedback);
            showNotification('✅ Feedback loaded successfully', 'success');
        } catch (error) {
            console.error('Error loading feedback:', error);
            showNotification('❌ Failed to load feedback: ' + error.message, 'error');
            document.getElementById('feedbackList').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-circle"></i>
                    <h3>Error Loading Feedback</h3>
                    <p>Please try again later.</p>
                </div>
            `;
        }
    }

    function filterFeedback() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('typeFilter').value;
        const categoryFilter = document.getElementById('categoryFilter').value;

        const filtered = allFeedback.filter(feedback => {
            const matchesSearch = !searchTerm ||
                feedback.description?.toLowerCase().includes(searchTerm) ||
                feedback.category?.toLowerCase().includes(searchTerm);

            const matchesType = !typeFilter || feedback.feedbackType === typeFilter;
            const matchesCategory = !categoryFilter || feedback.category === categoryFilter;

            return matchesSearch && matchesType && matchesCategory;
        });

        renderFeedback(filtered);
    }

    function renderFeedback(feedbackList) {
        const container = document.getElementById('feedbackList');

        if (!feedbackList || feedbackList.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comment-dots"></i>
                    <h3>No Feedback Found</h3>
                    <p>No feedback matches your current filters.</p>
                </div>
            `;
            document.getElementById('resultCount').textContent = '0 feedback';
            return;
        }

        // Sort by date (newest first)
        feedbackList.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        container.innerHTML = feedbackList.map(feedback => `
            <div class="feedback-item">
                <div class="feedback-header">
                    <div>
                        <span class="feedback-type type-${feedback.feedbackType}">
                            ${feedback.feedbackType}
                        </span>
                        <span class="feedback-rating">
                            ${'★'.repeat(feedback.rating)}${'☆'.repeat(5 - feedback.rating)}
                        </span>
                        <span class="feedback-category">${feedback.category}</span>
                    </div>
                    <div class="feedback-user">
                        ${feedback.feedbackType === 'ANONYMOUS' ?
            '<span class="user-anonymous">Anonymous User</span>' :
            `From: ${feedback.ownerName || 'User'}`
        }
                    </div>
                </div>

                ${feedback.description ? `
                    <div class="feedback-description">${feedback.description}</div>
                ` : ''}

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                    <div class="feedback-date">
                        Submitted on ${new Date(feedback.createdAt).toLocaleDateString()} at
                        ${new Date(feedback.createdAt).toLocaleTimeString()}
                    </div>
                    <button class="btn btn-danger" onclick="deleteFeedback(${feedback.id})"
                            title="Delete Feedback">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        `).join('');

        document.getElementById('resultCount').textContent = `${feedbackList.length} feedback items`;
    }

    function updateStats(feedbackList) {
        const stats = {
            total: feedbackList.length,
            anonymous: feedbackList.filter(f => f.feedbackType === 'ANONYMOUS').length,
            identified: feedbackList.filter(f => f.feedbackType === 'IDENTIFIED').length,
            averageRating: feedbackList.reduce((sum, f) => sum + f.rating, 0) / feedbackList.length || 0
        };

        document.getElementById('totalFeedback').textContent = stats.total;

        const statsContainer = document.getElementById('statsContainer');

        // Clear existing stats (keep total)
        const totalStat = statsContainer.querySelector('.stat-item:first-child');
        statsContainer.innerHTML = '';
        statsContainer.appendChild(totalStat);

        // Add additional stats
        const additionalStats = [
            { label: 'Anonymous', value: stats.anonymous },
            { label: 'Identified', value: stats.identified },
            { label: 'Avg Rating', value: stats.averageRating.toFixed(1) }
        ];

        additionalStats.forEach(stat => {
            const statElement = document.createElement('div');
            statElement.className = 'stat-item';
            statElement.innerHTML = `${stat.label}<br>${stat.value}`;
            statsContainer.appendChild(statElement);
        });
    }

    async function deleteFeedback(feedbackId) {
        const feedback = allFeedback.find(f => f.id === feedbackId);
        if (!feedback) return;

        const userInfo = feedback.feedbackType === 'ANONYMOUS' ?
            'Anonymous feedback' :
            `Feedback from ${feedback.ownerName || 'user'}`;

        if (!confirm(`Are you sure you want to delete this feedback?\n\n${userInfo}\nRating: ${feedback.rating}/5\nCategory: ${feedback.category}`)) {
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/api/v1/feedback/delete/${feedbackId}`, {
                method: 'DELETE'
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            }

            showNotification('✅ Feedback deleted successfully', 'success');

            // Remove from local array and re-render
            allFeedback = allFeedback.filter(f => f.id !== feedbackId);
            renderFeedback(allFeedback);
            updateStats(allFeedback);
        } catch (error) {
            console.error('Error deleting feedback:', error);
            showNotification('❌ Failed to delete feedback: ' + error.message, 'error');
        }
    }

    function showNotification(message, type = "success") {
        const toastRoot = document.getElementById('toast');
        const notification = document.createElement('div');
        notification.className = `toast ${type}`;
        notification.textContent = message;
        toastRoot.appendChild(notification);

        setTimeout(() => {
            if (notification.parentNode) {
                notification.parentNode.removeChild(notification);
            }
        }, 4000);
    }

    // Make functions available globally
    window.deleteFeedback = deleteFeedback;
</script>
</body>
</html>
