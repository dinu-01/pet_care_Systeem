<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Happy Paws – Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root{
      --bg:#0b1020;--card:#121935;--primary:#7c5cff;--accent:#00d3a7;
      --warn:#ffb020;--bad:#ff5c7a;--good:#10b981;--text:#e8ecf3;
      --muted:#9aa3b2;--border:#243057;--ring:rgba(124,92,255,.35)
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:"Inter",sans-serif;color:var(--text);
      background:
              radial-gradient(1000px 600px at 20% -10%,#1b2350 0%,transparent 60%),
              radial-gradient(1000px 600px at 90% 0%,#13234a 0%,transparent 60%),var(--bg);
      min-height:100vh;
    }

    /* Sidebar Layout */
    .dashboard-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--white);
      padding: 2rem 1rem;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .sidebar-header h2 {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
    }

    .sidebar-menu {
      list-style: none;
    }

    .sidebar-menu li {
      margin-bottom: 0.5rem;
    }

    .sidebar-menu a {
      color: var(--text);
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.3s ease;
    }

    .sidebar-menu a:hover, .sidebar-menu a.active {
      background: rgba(255,255,255,0.1);
    }

    /* Main Content */
    .main-content {
      padding: 2rem;
    }

    .container{max-width:1100px;margin:0 auto;padding:0 16px}
    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 18px;border:1px solid var(--border);border-radius:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01));
      backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,.3);
      margin-bottom: 20px;
    }
    h1{margin:0;font-size:20px}
    .muted{color:var(--muted);font-size:13px}
    .btn{
      border:none;border-radius:10px;padding:10px 14px;cursor:pointer;
      font-weight:600;font-size:14px;transition:.2s;
      background:#16214a;color:var(--text);border:1px solid var(--border);
    }
    .btn:hover{filter:brightness(1.08)}
    .btn-primary{background:linear-gradient(90deg,var(--primary),var(--accent));border:none;color:#fff}
    .btn-danger{background:linear-gradient(90deg,#ff5c7a,#ff7fa0);border:none;color:#fff}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
      border:1px solid var(--border);border-radius:16px;padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.25);margin-top:20px;
    }
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid var(--border)}
    th{background:#0f1837;text-align:left;position:sticky;top:0}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
      background:rgba(5,8,20,.55);backdrop-filter:blur(3px);z-index:20}
    .modal[aria-hidden="false"]{display:flex}
    .dialog{width:min(580px,94vw);border:1px solid var(--border);
      border-radius:16px;overflow:hidden;background:#0f1837}
    .modal-header,.modal-footer{display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;border-bottom:1px solid var(--border)}
    .modal-footer{border-top:1px solid var(--border);border-bottom:none}
    .modal-body{padding:16px;display:grid;gap:10px}
    input,textarea,select{
      background:#0e1631;border:1px solid var(--border);color:var(--text);
      border-radius:10px;padding:10px;outline:none;transition:.2s;
    }
    input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--ring)}
    #toast{position:fixed;bottom:16px;right:16px;display:grid;gap:8px;z-index:30}
    .toast{background:#0e1631;border:1px solid var(--border);color:var(--text);
      padding:10px 12px;border-radius:10px;box-shadow:0 10px 24px rgba(0,0,0,.35);animation:slideIn .25s ease-out}
    .toast.success{border-color:#1e9d7a}.toast.error{border-color:#cc3b5a}
    .error-message {
      color: var(--bad) !important;
      font-size: 12px;
      margin-top: 4px;
    }
    @keyframes slideIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
  </style>
</head>
<body>
<div class="dashboard-container">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-paw"></i> Happy Paws</h2>
      <small>Admin Dashboard</small>
    </div>

    <ul class="sidebar-menu">
      <li><a href="admin-dashboard.html" class="active"><i class="fas fa-bullhorn"></i> Announcements</a></li>
      <li><a href="admin-users.html"><i class="fas fa-users"></i> Manage Users</a></li>
      <li><a href="admin-feedback.html"><i class="fas fa-comment-dots"></i> Feedback</a></li>
      <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <header>
        <div>
          <h1>🐾 Admin Dashboard</h1>
          <div class="muted">Manage Role-Based Announcements</div>
        </div>
        <button id="newBtn" class="btn btn-primary">+ New Announcement</button>
      </header>

      <div class="card">
        <h2>📢 All Announcements</h2>
        <div style="margin-bottom:10px;">
          <label class="muted">Filter by Role: </label>
          <select id="roleFilter" style="margin-left:10px;">
            <option value="">All</option>
            <option value="PET_OWNER">Pet Owner</option>
            <option value="VETERINARIAN">Veterinarian</option>
            <option value="GROOMER">Groomer</option>
            <option value="APPOINTMENT_MANAGER">Appointment Manager</option>
            <option value="SHOP_KEEPER">Shop Keeper</option>
          </select>
        </div>
        <div class="table-wrap">
          <table id="tbl">
            <thead>
            <tr><th>ID</th><th>Title</th><th>Message</th><th>Target Role</th><th>Created By</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="dialog">
    <div class="modal-header">
      <h3 id="modalTitle">New Announcement</h3>
      <button class="btn" id="closeModal">✕</button>
    </div>
    <form id="form" class="modal-body">
      <div>
        <label>Title *</label>
        <input name="title" required>
      </div>
      <div>
        <label>Message *</label>
        <textarea name="message" rows="4" required></textarea>
      </div>
      <div>
        <label>Target Role *</label>
        <select name="targetRole" required>
          <option value="ALL">All Users</option>
          <option value="PET_OWNER">Pet Owner</option>
          <option value="VETERINARIAN">Veterinarian</option>
          <option value="GROOMER">Groomer</option>
          <option value="APPOINTMENT_MANAGER">Appointment Manager</option>
          <option value="SHOP_KEEPER">Shop Keeper</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
  const BASE_URL="http://localhost:8080";
  const tblBody=document.querySelector("#tbl tbody");
  const modal=document.getElementById("modal");
  const form=document.getElementById("form");
  const modalTitle=document.getElementById("modalTitle");
  const toastRoot=document.getElementById("toast");
  const newBtn=document.getElementById("newBtn");
  const closeModalBtn=document.getElementById("closeModal");
  const cancelBtn=document.getElementById("cancelBtn");
  const roleFilter=document.getElementById("roleFilter");
  let EDIT_ID=null;

  const currentUser=JSON.parse(localStorage.getItem("currentUser"));
  if(!currentUser||currentUser.role!=="ADMIN"){
    alert("Access Denied – Login as Admin");
    window.location.href="login.html";
  }
  const ADMIN_ID=currentUser.id;

  /* ---------- VALIDATION ---------- */
  function containsNumbers(str) {
    return /\d/.test(str);
  }

  function validateTitle(title) {
    if (!title.trim()) {
      return "⚠️ Title is required";
    }
    if (containsNumbers(title)) {
      return "⚠️ Title cannot contain numbers";
    }
    return null; // No error
  }

  /* ---------- UTILITIES ---------- */
  function toast(msg,type="success"){
    const el=document.createElement("div");
    el.className=`toast ${type}`;
    el.textContent=msg;
    toastRoot.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }

  async function api(path,opt={}){
    const res=await fetch(BASE_URL+path,{
      headers:{"Content-Type":"application/json"},...opt
    });
    if(!res.ok){
      const err=await res.text();
      throw new Error(err||`HTTP ${res.status}`);
    }
    const ct=res.headers.get("content-type")||"";
    return ct.includes("json")?res.json():res.text();
  }

  /* ---------- MODAL ---------- */
  function openModal(){modal.setAttribute("aria-hidden","false");}
  function closeModal(){modal.setAttribute("aria-hidden","true");form.reset();EDIT_ID=null;}

  /* ---------- LOAD ---------- */
  async function loadAll(){
    try{
      const list=await api("/api/v1/announcements/view-all");
      render(list);
    }catch(e){toast(e.message,"error");}
  }

  function render(list){
    const filter=roleFilter.value;
    tblBody.innerHTML="";
    const filtered=filter?list.filter(a=>a.targetRole===filter):list;
    if(!filtered.length){
      tblBody.innerHTML=`<tr><td colspan="7" class="muted">No announcements found</td></tr>`;
      return;
    }
    filtered.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    filtered.forEach(a=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`
      <td>${a.id}</td>
      <td><strong>${a.title}</strong></td>
      <td>${a.message}</td>
      <td><span class="muted">${a.targetRole||'ALL'}</span></td>
      <td>${a.createdBy||'Admin'}</td>
      <td>${new Date(a.createdAt).toLocaleString()}</td>
      <td>
        <button class="btn" data-a="edit" data-id="${a.id}">Edit</button>
        <button class="btn btn-danger" data-a="del" data-id="${a.id}">Delete</button>
      </td>`;
      tblBody.appendChild(tr);
    });
  }

  /* ---------- TABLE ACTIONS ---------- */
  tblBody.addEventListener("click",async e=>{
    const btn=e.target.closest("button");if(!btn)return;
    const id=btn.dataset.id,act=btn.dataset.a;
    if(act==="edit"){
      try{
        const a=await api(`/api/v1/announcements/view/${id}`);
        EDIT_ID=id;modalTitle.textContent="Edit Announcement";
        form.title.value=a.title;form.message.value=a.message;form.targetRole.value=a.targetRole||"ALL";
        openModal();
      }catch(err){toast(err.message,"error");}
    }
    if(act==="del"){
      if(!confirm("🗑️ Delete this announcement?"))return;
      try{
        await api(`/api/v1/announcements/delete/${ADMIN_ID}/${id}`,{method:"DELETE"});
        toast("✅ Deleted successfully");loadAll();
      }catch(err){toast(err.message,"error");}
    }
  });

  /* ---------- REAL-TIME VALIDATION ---------- */
  form.title.addEventListener("input", function() {
    const title = this.value.trim();
    const error = validateTitle(title);

    // Remove any existing error styling
    this.style.borderColor = "";
    this.style.boxShadow = "";

    // Remove any existing error message
    const existingError = this.parentNode.querySelector(".error-message");
    if (existingError) {
      existingError.remove();
    }

    // Add error styling and message if validation fails
    if (error) {
      this.style.borderColor = "var(--bad)";
      this.style.boxShadow = "0 0 0 3px rgba(255, 92, 122, 0.35)";

      const errorElement = document.createElement("div");
      errorElement.className = "error-message";
      errorElement.style.color = "var(--bad)";
      errorElement.style.fontSize = "12px";
      errorElement.style.marginTop = "4px";
      errorElement.textContent = error;
      this.parentNode.appendChild(errorElement);
    }
  });

  /* ---------- FORM SUBMIT ---------- */
  form.addEventListener("submit", async e => {
    e.preventDefault();

    const title = form.title.value.trim();
    const message = form.message.value.trim();
    const targetRole = form.targetRole.value;

    // Validate title
    const titleError = validateTitle(title);
    if (titleError) {
      return toast(titleError, "error");
    }

    if (!message) {
      return toast("⚠️ Message is required", "error");
    }

    const payload = {
      title: title,
      message: message,
      targetRole: targetRole
    };

    try {
      if (EDIT_ID) {
        await api(`/api/v1/announcements/update/${ADMIN_ID}/${EDIT_ID}`, {
          method: "PUT",
          body: JSON.stringify(payload)
        });
        toast("✅ Updated successfully");
      } else {
        await api(`/api/v1/announcements/create/${ADMIN_ID}`, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        toast("✅ Created successfully");
      }
      closeModal();
      loadAll();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  /* ---------- EVENTS ---------- */
  newBtn.addEventListener("click",()=>{modalTitle.textContent="New Announcement";openModal();});
  closeModalBtn.addEventListener("click",closeModal);
  cancelBtn.addEventListener("click",closeModal);
  roleFilter.addEventListener("change",loadAll);

  /* ---------- INIT ---------- */
  loadAll();
</script>
</body>
</html>
